<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header id="app-header">
    <svg class="brand-mark" viewBox="0 0 1024 1024" width="24" height="24" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ponto" focusable="false">
      <rect fill="#0d5c63" x="16" y="16" width="992" height="992" rx="220"/>
      <circle fill="#f4ead2" cx="512" cy="410" r="310"/>
      <g fill="#1f2829">
        <rect x="488" y="140" width="48" height="90" rx="10"/><rect x="488" y="590" width="48" height="90" rx="10"/>
        <rect x="222" y="386" width="90" height="48" rx="10"/><rect x="712" y="386" width="90" height="48" rx="10"/>
      </g>
      <g stroke="#1f2829" stroke-linecap="round">
        <line x1="512" y1="410" x2="512" y2="205" stroke-width="64"/>
        <line x1="512" y1="410" x2="650" y2="480" stroke-width="52"/>
        <circle cx="512" cy="410" r="52" fill="#1f2829"/>
      </g>
      <path fill="#f4ead2" d="M320 790 H704 V1008 H320 Z"/>
      <g fill="#1f2829"><circle cx="440" cy="860" r="30"/><circle cx="440" cy="950" r="30"/><circle cx="590" cy="900" r="30"/></g>
    </svg>
    <span class="brand-name" data-i18n="ext_name"></span>
  </header>
  <main id="app">
    <section id="view-setup" hidden>
      <p data-i18n="popup_setup_hint"></p>
      <button id="btn-configure" class="btn" data-i18n="popup_configure"></button>
    </section>

    <section id="view-error" hidden>
      <p id="error-message"></p>
      <div class="row">
        <button id="btn-retry" class="btn btn--quiet" data-i18n="popup_retry"></button>
        <button id="btn-error-configure" class="btn" data-i18n="popup_configure" hidden></button>
      </div>
    </section>

    <section id="view-running" hidden>
      <input type="text" id="running-description" data-i18n-placeholder="popup_description_placeholder">
      <p class="running-project"><i class="dot" id="running-dot" hidden></i><span id="running-project-name"></span></p>
      <div class="running-row">
        <span class="clock tabular-nums" id="clock">0:00:00</span>
        <button id="btn-stop" class="btn btn--danger" data-i18n="popup_stop"></button>
      </div>
    </section>

    <section id="view-idle" hidden>
      <input type="text" id="start-description" data-i18n-placeholder="popup_description_placeholder" autofocus>

      <div class="combo" id="project-combo">
        <button type="button" class="combo-trigger" id="project-trigger">
          <i class="dot" id="project-dot" hidden></i><span id="project-label"></span>
        </button>
        <div class="combo-panel" id="project-panel" hidden>
          <input type="text" class="combo-search" id="project-search" data-i18n-placeholder="popup_search_placeholder">
          <ul class="combo-list" id="project-list"></ul>
        </div>
      </div>

      <select id="task-select" hidden></select>

      <div id="tag-chips" class="chips"></div>

      <div class="start-row">
        <label class="billable"><input type="checkbox" id="billable"><span data-i18n="popup_billable"></span></label>
        <button id="btn-start" class="btn" data-i18n="popup_start"></button>
      </div>

      <section id="recent-section" hidden>
        <h2 data-i18n="popup_recent"></h2>
        <ul id="recent-list"></ul>
      </section>

      <button id="btn-manual-toggle" class="link-btn" type="button">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        <span data-i18n="popup_manual_title"></span>
      </button>

      <form id="manual-form" class="manual-form" hidden>
        <input type="text" id="manual-description" data-i18n-placeholder="popup_manual_description_placeholder">
        <div class="manual-times">
          <label>
            <span data-i18n="popup_manual_start"></span>
            <input type="datetime-local" id="manual-start" required>
          </label>
          <label>
            <span data-i18n="popup_manual_end"></span>
            <input type="datetime-local" id="manual-end" required>
          </label>
          <label>
            <span data-i18n="popup_manual_duration"></span>
            <input type="text" id="manual-duration" inputmode="text" data-i18n-placeholder="popup_manual_duration_placeholder">
          </label>
        </div>
        <div class="manual-actions">
          <button type="button" id="btn-manual-cancel" class="btn btn--quiet" data-i18n="popup_manual_cancel"></button>
          <button type="submit" id="btn-manual-save" class="btn" data-i18n="popup_manual_save"></button>
        </div>
      </form>
    </section>

    <p id="toast" role="status" hidden></p>

    <footer>
      <a id="link-app" target="_blank" data-i18n="popup_open_app"></a>
      <button id="btn-options">⚙</button>
    </footer>
  </main>
  <script src="popup.js"></script>
</body>
</html>
