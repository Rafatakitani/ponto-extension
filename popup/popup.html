<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header id="app-header">
    <img class="brand-mark" src="../assets/icon-clock.svg" width="18" height="18" alt="" aria-hidden="true">
    <span class="brand-name" data-i18n="ext_name"></span>
    <div class="header-actions">
      <button id="btn-refresh" class="icon-btn" type="button">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M8 16H3v5"/></svg>
      </button>
      <a id="link-app" class="icon-btn" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
      </a>
      <button id="btn-options" class="icon-btn" type="button">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <main id="app">
    <section id="view-setup" hidden>
      <p data-i18n="popup_setup_hint"></p>
      <button id="btn-configure" class="btn" data-i18n="popup_configure"></button>
    </section>

    <section id="view-error" hidden>
      <p id="error-message"></p>
      <div class="row">
        <button id="btn-retry" class="btn btn--quiet" data-i18n="popup_retry"></button>
        <button id="btn-error-configure" class="btn" data-i18n="popup_configure" hidden></button>
      </div>
    </section>

    <!-- Tela principal: compose card (timer/rodando/manual) + ledger por dia.
         Idle e rodando são o MESMO screen; só o card muda de estado. -->
    <section id="view-main" hidden>
      <div class="compose-card" id="compose" data-mode="timer">
        <!-- Eyebrow: só aparece no modo manual -->
        <p class="compose-eyebrow" id="compose-eyebrow" data-i18n="popup_manual_title" hidden></p>

        <!-- Linha 1: descrição + botão redondo que morfa (▶ / ■ / ＋) -->
        <div class="compose-action">
          <input type="text" id="description" class="compose-input" data-i18n-placeholder="popup_description_placeholder">
          <button id="btn-primary" class="round-btn" type="button" aria-label="">
            <svg class="ico-play" viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
            <svg class="ico-stop" viewBox="0 0 24 24" width="13" height="13" fill="currentColor" aria-hidden="true" hidden><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            <svg class="ico-add" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true" hidden><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          </button>
        </div>

        <!-- Linha 2: meta chips (projeto · tags · faturável · alternar modo) -->
        <div class="meta-row" id="meta-row">
          <div class="combo" id="project-combo">
            <button type="button" class="chip chip--meta" id="project-trigger">
              <i class="dot" id="project-dot" hidden></i><span id="project-label"></span>
            </button>
            <div class="combo-panel" id="project-panel" hidden>
              <input type="text" class="combo-search" id="project-search" data-i18n-placeholder="popup_search_placeholder">
              <ul class="combo-list" id="project-list"></ul>
            </div>
          </div>

          <div class="combo" id="tags-combo">
            <button type="button" class="chip chip--meta" id="tags-trigger" aria-haspopup="true">
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg>
              <span id="tags-label"></span>
            </button>
            <div class="combo-panel" id="tags-panel" hidden>
              <input type="text" class="combo-search" id="tags-search" data-i18n-placeholder="popup_search_placeholder">
              <ul class="combo-list" id="tags-list"></ul>
            </div>
          </div>

          <button type="button" class="icon-chip" id="btn-billable" aria-pressed="false">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </button>

          <button type="button" class="icon-chip mode-toggle" id="btn-mode">
            <svg class="ico-mode-manual" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
            <svg class="ico-mode-timer" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/></svg>
          </button>
        </div>

        <!-- Linha do timer rodando: elapsed + hora de início -->
        <div class="run-timer" id="run-timer" hidden>
          <span class="clock tabular-nums" id="clock">0:00:00</span>
          <span class="run-started" id="run-started"></span>
        </div>

        <!-- Linha de tempos (só no modo manual): início – fim · data · duração -->
        <div class="manual-times" id="manual-times" hidden>
          <input type="time" id="manual-start-time" aria-label="" required>
          <span class="dash">–</span>
          <input type="time" id="manual-end-time" aria-label="" required>
          <input type="date" id="manual-date" aria-label="" required>
          <input type="text" id="manual-duration" class="tabular-nums" inputmode="text" data-i18n-placeholder="popup_manual_duration_placeholder" aria-label="">
        </div>
      </div>

      <!-- Ledger: total da semana + dias, cada dia com total; scrolla aqui dentro -->
      <p class="week-line" id="week-line" hidden>
        <span class="week-label" data-i18n="popup_this_week"></span>
        <span class="week-total tabular-nums" id="week-total"></span>
      </p>
      <div id="ledger" class="ledger"></div>
      <div id="ledger-empty" class="ledger-empty" hidden>
        <img src="../assets/icon-clock.svg" width="32" height="32" alt="" aria-hidden="true">
        <p data-i18n="popup_empty_ledger"></p>
      </div>
    </section>

    <p id="toast" role="status" hidden></p>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
