<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title data-i18n="options_title"></title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="options">
    <h1 data-i18n="ext_name"></h1>
    <form id="form">
      <label>
        <span data-i18n="options_api_url_label"></span>
        <input type="url" id="api-url" required placeholder="https://ponto.exemplo.dev">
        <small data-i18n="options_api_url_hint"></small>
      </label>
      <label>
        <span data-i18n="options_token_label"></span>
        <div class="token-row">
          <input type="password" id="token" required autocomplete="off">
          <button type="button" id="btn-reveal" class="btn btn--quiet" data-i18n="options_token_reveal"></button>
        </div>
        <small data-i18n="options_token_hint"></small>
      </label>
      <label>
        <span data-i18n="options_reminder_label"></span>
        <input type="number" id="reminder-hours" min="0" max="24" step="any" value="9">
        <small data-i18n="options_reminder_hint"></small>
      </label>
      <div class="actions">
        <button type="button" id="btn-test" class="btn btn--quiet" data-i18n="options_test"></button>
        <button type="submit" class="btn" data-i18n="options_save"></button>
      </div>
      <p id="status" role="status"></p>
    </form>
  </main>
  <script type="module" src="options.js"></script>
</body>
</html>
